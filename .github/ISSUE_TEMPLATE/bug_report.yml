name: Bug report
description: Report a reproducible defect that is not security-sensitive.
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private keys, DEKs, tokens, production certificates or vulnerability details in public issues.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This is not a security vulnerability or sensitive disclosure. I will use SECURITY.md for private reports.
          required: true
        - label: I removed secrets, keys, tokens, certificates and customer data from this report.
          required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, commit SHA or package version where the issue occurs.
      placeholder: "0.1.0 / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - server
        - signer
        - custodia-admin
        - Go SDK
        - Python SDK
        - Node.js / TypeScript SDK
        - Java SDK
        - C++ SDK
        - Rust SDK
        - Bash helper
        - packaging
        - Docker / Compose
        - Helm / Kubernetes
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction steps
      description: Include exact commands, sanitized config and relevant logs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Go/Python/Node/Rust versions, package type and deployment mode.
      placeholder: "Ubuntu 24.04, amd64, Go 1.26, Lite profile, .deb package"
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      render: text
