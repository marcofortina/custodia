name: Bug report
description: Report a reproducible defect that is not security-sensitive.
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private keys, DEKs, tokens, production certificates, customer data or vulnerability details in public issues. Use SECURITY.md for private reports.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This is not a security vulnerability or sensitive disclosure.
          required: true
        - label: I removed secrets, keys, tokens, certificates and customer data from this report.
          required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the defect and the user-visible behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands or minimal sanitized config when useful.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, package/source install, deployment mode and relevant tool versions.
      placeholder: "Ubuntu 24.04, amd64, Lite profile, source install"
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      render: text
