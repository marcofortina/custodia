name: Custom issue
description: Use this for documentation, maintenance or questions that do not fit another template.
title: "chore: "
labels: [needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not use this template for vulnerabilities or sensitive reports. Use SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should maintainers know?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details or suggested outcome
      description: Add links, context, proposed wording, commands or acceptance criteria if useful.
