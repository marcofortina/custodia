name: Custom issue
description: Use this for documentation, packaging, CI or maintenance topics that are not bugs or features.
title: "chore: "
labels: [needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not use this template for vulnerabilities or sensitive reports. Use SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - documentation
        - packaging
        - CI / release
        - tests
        - examples
        - maintenance
        - question
        - other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
  - type: textarea
    id: acceptance
    attributes:
      label: Suggested resolution or acceptance criteria
