name: Feature request
description: Propose a new capability or improvement.
title: "feat: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests must preserve Custodia's security boundary: plaintext, DEKs, private keys and key trust remain outside the server.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator or integrator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior, API, CLI, package or documentation change.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Security boundary acknowledgement
      options:
        - label: This proposal does not require server-side plaintext handling.
          required: true
        - label: This proposal does not require server-side DEK/private-key handling or server-managed public-key trust.
          required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria or tests
      description: Optional. Add concrete checks, commands or behavior that would make this complete.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Add alternatives considered, links, screenshots or implementation notes.
