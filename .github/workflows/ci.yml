name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-check:
    name: Release check and packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true
          cache-dependency-path: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: clients/node/package.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            default-jdk-headless \
            g++ \
            jq \
            libcurl4-openssl-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Python client dependencies
        run: python -m pip install -e clients/python

      - name: Run repository release check
        run: make release-check

      - name: Build Debian packages
        run: |
          VERSION=0.0.0+ci \
          REVISION=1 \
          COMMIT="${GITHUB_SHA::12}" \
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          make package-deb

      - name: Build RPM packages
        run: |
          VERSION=0.0.0_ci \
          REVISION=1 \
          COMMIT="${GITHUB_SHA::12}" \
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          make package-rpm

      - uses: actions/upload-artifact@v7
        with:
          name: custodia-linux-packages
          path: dist/packages/*
          if-no-files-found: error
