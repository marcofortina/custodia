version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Rome
    labels:
      - dependencies
      - ci

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:10"
      timezone: Europe/Rome
    labels:
      - dependencies
      - go

  - package-ecosystem: pip
    directory: /clients/python
    schedule:
      interval: weekly
      day: monday
      time: "07:20"
      timezone: Europe/Rome
    labels:
      - dependencies
      - python

  - package-ecosystem: npm
    directory: /clients/node
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Rome
    labels:
      - dependencies
      - nodejs

  - package-ecosystem: cargo
    directory: /clients/rust
    schedule:
      interval: weekly
      day: monday
      time: "07:40"
      timezone: Europe/Rome
    labels:
      - dependencies
      - rust

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
      day: monday
      time: "07:50"
      timezone: Europe/Rome
    labels:
      - dependencies
      - docker
