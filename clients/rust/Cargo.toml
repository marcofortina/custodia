[package]
name = "custodia-client"
version = "0.0.0"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
description = "Custodia Rust client for opaque REST/mTLS payloads and local client-side crypto"

[lib]
name = "custodia_client"
path = "src/lib.rs"

[dependencies]
aes-gcm = "0.10"
base64 = "0.22"
hmac = "0.12"
rand = "0.8"
sha2 = "0.10"
x25519-dalek = { version = "2", features = ["static_secrets"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
urlencoding = "2.1"
