services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: custodia
      POSTGRES_USER: custodia
      POSTGRES_PASSWORD: custodia_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  custodia:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        GO_BUILD_TAGS: "${CUSTODIA_GO_BUILD_TAGS:-}"
        CUSTODIA_VERSION: "${CUSTODIA_VERSION:-dev}"
        CUSTODIA_COMMIT: "${CUSTODIA_COMMIT:-unknown}"
        CUSTODIA_DATE: "${CUSTODIA_DATE:-unknown}"
    environment:
      CUSTODIA_API_ADDR: ":8443"
      CUSTODIA_HEALTH_ADDR: ":8080"
      CUSTODIA_STORE_BACKEND: memory
      CUSTODIA_RATE_LIMIT_BACKEND: valkey
      CUSTODIA_VALKEY_URL: redis://valkey:6379/0
      CUSTODIA_DEV_INSECURE_HTTP: "true"
      CUSTODIA_BOOTSTRAP_CLIENTS: client_alice:client_alice,client_bob:client_bob,admin:admin
      CUSTODIA_ADMIN_CLIENT_IDS: admin
    depends_on:
      - valkey
    ports:
      - "8443:8443"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/live"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
  valkey-data:
