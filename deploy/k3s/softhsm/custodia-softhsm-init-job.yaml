#
# Lab-only SoftHSM token initialization Job. It creates a filesystem-backed
# token and imports the existing signer CA key into SoftHSM. Do not use as
# production HSM evidence.
apiVersion: batch/v1
kind: Job
metadata:
  name: custodia-softhsm-init
  namespace: custodia
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: softhsm-init
          image: registry.example.internal/custodia/custodia-softhsm-lab:0.4.0-lab
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /var/lib/softhsm/tokens /var/lib/softhsm/import /run/custodia-softhsm
              printf 'directories.tokendir = /var/lib/softhsm/tokens\nobjectstore.backend = file\n' > /run/custodia-softhsm/softhsm2.conf
              export SOFTHSM2_CONF=/run/custodia-softhsm/softhsm2.conf
              pin="$(cat /run/custodia-softhsm/pin)"
              if ! softhsm2-util --show-slots | grep -F 'custodia-lab' >/dev/null; then
                slot="$(softhsm2-util --show-slots | awk -F: '/Slot [0-9]+/{print $2; exit}' | tr -d ' ')"
                softhsm2-util --init-token --slot "${slot:-0}" --label custodia-lab --so-pin "$(cat /run/custodia-softhsm/so-pin)" --pin "$pin"
              fi

              if [ -s /etc/custodia/signer/ca.pass ]; then
                openssl pkcs8 \
                  -topk8 \
                  -nocrypt \
                  -passin file:/etc/custodia/signer/ca.pass \
                  -in /etc/custodia/signer/ca.key \
                  -outform DER \
                  -out /var/lib/softhsm/import/custodia-signer-ca-key.der
              else
                openssl pkcs8 \
                  -topk8 \
                  -nocrypt \
                  -in /etc/custodia/signer/ca.key \
                  -outform DER \
                  -out /var/lib/softhsm/import/custodia-signer-ca-key.der
              fi

              pkcs11-tool --module /usr/lib/softhsm/libsofthsm2.so --token-label custodia-lab --login --pin "$pin" --delete-object --type privkey --id 01 --label custodia-signer-ca >/dev/null 2>&1 || true
              pkcs11-tool --module /usr/lib/softhsm/libsofthsm2.so --token-label custodia-lab --login --pin "$pin" --delete-object --type pubkey --id 01 --label custodia-signer-ca >/dev/null 2>&1 || true
              pkcs11-tool --module /usr/lib/softhsm/libsofthsm2.so --token-label custodia-lab --login --pin "$pin" --delete-object --type cert --id 01 --label custodia-signer-ca >/dev/null 2>&1 || true
              pkcs11-tool \
                --module /usr/lib/softhsm/libsofthsm2.so \
                --token-label custodia-lab \
                --login \
                --pin "$pin" \
                --write-object /var/lib/softhsm/import/custodia-signer-ca-key.der \
                --type privkey \
                --id 01 \
                --label custodia-signer-ca \
                --usage-sign
              rm -f /var/lib/softhsm/import/custodia-signer-ca-key.der
          volumeMounts:
            - name: softhsm-tokens
              mountPath: /var/lib/softhsm
            - name: softhsm-pin
              mountPath: /run/custodia-softhsm/pin
              subPath: pin
              readOnly: true
            - name: softhsm-pin
              mountPath: /run/custodia-softhsm/so-pin
              subPath: so-pin
              readOnly: true
            - name: signer-ca
              mountPath: /etc/custodia/signer
              readOnly: true
      volumes:
        - name: softhsm-tokens
          persistentVolumeClaim:
            claimName: custodia-softhsm-tokens
        - name: softhsm-pin
          secret:
            secretName: custodia-softhsm-pin
        - name: signer-ca
          secret:
            secretName: custodia-signer-ca
