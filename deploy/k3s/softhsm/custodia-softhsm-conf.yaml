# Lab-only SoftHSM configuration shared by the init Job and signer pod.
apiVersion: v1
kind: ConfigMap
metadata:
  name: custodia-softhsm-conf
  namespace: custodia
data:
  softhsm2.conf: |
    directories.tokendir = /var/lib/softhsm/tokens
    objectstore.backend = file
