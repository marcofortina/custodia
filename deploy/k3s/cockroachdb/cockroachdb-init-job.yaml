apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-init
  namespace: custodia-db
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/component: database-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockroachdb-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: cockroachdb/cockroach:v24.3.5
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cockroach init --insecure --host=cockroachdb-0.cockroachdb.custodia-db.svc || true
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --execute="CREATE DATABASE IF NOT EXISTS custodia;"
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --execute="CREATE USER IF NOT EXISTS custodia;"
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --execute="GRANT ALL ON DATABASE custodia TO custodia;"
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --database=custodia < /schema/001_init.sql
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --database=custodia --execute="GRANT USAGE ON SCHEMA public TO custodia;"
              cockroach sql --insecure --host=cockroachdb-public.custodia-db.svc --database=custodia --execute="GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO custodia;"
          volumeMounts:
            - name: postgres-schema
              mountPath: /schema
              readOnly: true
      volumes:
        - name: postgres-schema
          configMap:
            name: custodia-postgres-schema
