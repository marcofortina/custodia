apiVersion: batch/v1
kind: Job
metadata:
  name: custodia-lab-minio-init
  namespace: custodia
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-lock-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/component: object-lock-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: custodia-minio-lab
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: custodia-minio-lab
                  key: root-password
            - name: CUSTODIA_AUDIT_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: custodia-minio-lab
                  key: bucket
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local http://custodia-lab-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
                sleep 2
              done
              mc mb --ignore-existing --with-lock "local/${CUSTODIA_AUDIT_S3_BUCKET}"
              mc version enable "local/${CUSTODIA_AUDIT_S3_BUCKET}"
              mc retention set --default COMPLIANCE 30d "local/${CUSTODIA_AUDIT_S3_BUCKET}"
              mc retention info "local/${CUSTODIA_AUDIT_S3_BUCKET}"
              echo "custodia MinIO Object Lock lab bucket ready"
