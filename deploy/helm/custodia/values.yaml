# Deployment profile. Use full for PostgreSQL/CockroachDB + Valkey, lite for
# single-replica SQLite with a mandatory PersistentVolumeClaim, or custom for
# explicitly reviewed non-standard combinations.
profile: full
replicaCount: 3
revisionHistoryLimit: 3

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

image:
  repository: custodia/custodia-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8443
  annotations: {}

web:
  enabled: true
  port: 9443
  exposeOnService: true
  # Web MFA material is provided through a Kubernetes Secret so operators do
  # not need to exec into pods. Create it from an operator workstation with
  # docs/KUBERNETES_BOOTSTRAP_MATERIAL.md before installing the chart.
  mfaSecretName: custodia-web-mfa
  totpSecretKey: totp-secret
  sessionSecretKey: session-secret

podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

health:
  port: 8080
  exposeOnService: false

config:
  serverURL: "https://custodia.example.internal:8443"
  apiAddr: ":8443"
  webAddr: ":9443"
  healthAddr: ":8080"
  storeBackend: postgres
  databaseURL: ""
  databaseURLSecretName: custodia-database
  databaseURLSecretKey: database-url
  rateLimitBackend: valkey
  valkeyURLSecretName: custodia-valkey
  valkeyURLSecretKey: valkey-url
  adminClientIDs: admin
  maxEnvelopesPerSecret: 100
  clientRateLimitPerSecond: 100
  globalRateLimitPerSecond: 5000
  ipRateLimitPerSecond: 1000
  httpReadTimeoutSeconds: 15
  httpWriteTimeoutSeconds: 15
  httpIdleTimeoutSeconds: 60
  shutdownTimeoutSeconds: 10
  deploymentMode: kubernetes-full
  databaseHATarget: external
  auditShipmentSink: ""
  signerURL: ""
  # Kubernetes pods log to stdout/stderr by default. Keep this empty to avoid
  # requiring a writable /var/log/custodia path in hardened containers.
  logFile: ""

mtls:
  enabled: true
  secretName: custodia-mtls
  certKey: tls.crt
  keyKey: tls.key
  clientCAKey: ca.crt
  clientCRLKey: ""

signer:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 3
  service:
    port: 9444
    annotations: {}
  addr: ":9444"
  adminSubjects: admin
  defaultTTLHours: 12
  shutdownTimeoutSeconds: 10
  keyProvider: file
  pkcs11SignCommand: ""
  # Required when keyProvider=pkcs11. Use custom-image when the command is
  # baked into the image, or volume when signer.extraVolumes/extraVolumeMounts
  # deliver it at runtime.
  pkcs11SignCommandDelivery: ""
  auditLogFile: ""
  extraVolumeMounts: []
  extraVolumes: []
  secretName: custodia-signer-ca
  caCertKey: ca.crt
  caKeyKey: ca.key
  caPassphraseKey: ca.pass
  crlKey: client.crl.pem
  clientSecretName: custodia-signer-client
  clientCertKey: tls.crt
  clientKeyKey: tls.key
  clientCAKey: ca.crt
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Local data persistence is mandatory for profile=lite because SQLite must not
# live on the pod filesystem. It is normally unnecessary for profile=full, where
# durable state belongs to PostgreSQL/CockroachDB and external infrastructure.
persistence:
  enabled: false
  existingClaim: ""
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  mountPath: /var/lib/custodia


topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway


probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  ingressNamespaceSelector: {}
  egress:
    enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
