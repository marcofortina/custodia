replicaCount: 3
revisionHistoryLimit: 3

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

image:
  repository: custodia/custodia-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8443
  annotations: {}

podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

health:
  port: 8080
  exposeOnService: false

config:
  apiAddr: ":8443"
  healthAddr: ":8080"
  storeBackend: postgres
  databaseURLSecretName: custodia-database
  databaseURLSecretKey: database-url
  rateLimitBackend: valkey
  valkeyURLSecretName: custodia-valkey
  valkeyURLSecretKey: valkey-url
  adminClientIDs: admin
  maxEnvelopesPerSecret: 100
  clientRateLimitPerSecond: 100
  globalRateLimitPerSecond: 5000
  ipRateLimitPerSecond: 1000
  httpReadTimeoutSeconds: 15
  httpWriteTimeoutSeconds: 15
  httpIdleTimeoutSeconds: 60
  shutdownTimeoutSeconds: 10
  deploymentMode: single-region
  databaseHATarget: external
  auditShipmentSink: ""

mtls:
  enabled: true
  secretName: custodia-mtls
  certKey: tls.crt
  keyKey: tls.key
  clientCAKey: ca.crt
  clientCRLKey: ""


topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway


probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  ingressNamespaceSelector: {}
  egress:
    enabled: false

nodeSelector: {}

tolerations: []

affinity: {}

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
