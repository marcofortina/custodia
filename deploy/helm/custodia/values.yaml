replicaCount: 3

image:
  repository: custodia/custodia-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443

health:
  port: 8080

config:
  apiAddr: ":8443"
  healthAddr: ":8080"
  storeBackend: postgres
  databaseURLSecretName: custodia-database
  databaseURLSecretKey: database-url
  rateLimitBackend: valkey
  valkeyURLSecretName: custodia-valkey
  valkeyURLSecretKey: valkey-url
  adminClientIDs: admin
  maxEnvelopesPerSecret: 100
  clientRateLimitPerSecond: 100
  globalRateLimitPerSecond: 5000
  ipRateLimitPerSecond: 1000
  httpReadTimeoutSeconds: 15
  httpWriteTimeoutSeconds: 15
  httpIdleTimeoutSeconds: 60
  shutdownTimeoutSeconds: 10

mtls:
  enabled: true
  secretName: custodia-mtls
  certKey: tls.crt
  keyKey: tls.key
  clientCAKey: ca.crt
  clientCRLKey: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  ingressNamespaceSelector: {}
  egress:
    enabled: false
