{{- $profile := lower (default "full" .Values.profile) -}}
{{- if eq $profile "lite" -}}
{{- if ne (int .Values.replicaCount) 1 -}}
{{- fail "profile=lite requires replicaCount=1 because SQLite Lite is a single-writer profile; use profile=full with PostgreSQL/CockroachDB for HA" -}}
{{- end -}}
{{- if not .Values.persistence.enabled -}}
{{- fail "profile=lite requires persistence.enabled=true; SQLite data must live on a PersistentVolumeClaim, not on the pod filesystem" -}}
{{- end -}}
{{- if ne (lower .Values.config.storeBackend) "sqlite" -}}
{{- fail "profile=lite requires config.storeBackend=sqlite" -}}
{{- end -}}
{{- if not (hasPrefix "file:" .Values.config.databaseURL) -}}
{{- fail "profile=lite requires config.databaseURL to be a file: SQLite URL under the persistent mount path" -}}
{{- end -}}
{{- if ne (lower .Values.config.rateLimitBackend) "memory" -}}
{{- fail "profile=lite requires config.rateLimitBackend=memory; use profile=full for Valkey-backed rate limiting" -}}
{{- end -}}
{{- end -}}
{{- if eq $profile "full" -}}
{{- if eq (lower .Values.config.storeBackend) "sqlite" -}}
{{- fail "profile=full must not use config.storeBackend=sqlite; use PostgreSQL/CockroachDB through the postgres backend or switch to profile=lite" -}}
{{- end -}}
{{- if eq (lower .Values.config.rateLimitBackend) "memory" -}}
{{- fail "profile=full must not use config.rateLimitBackend=memory; configure Valkey or use profile=lite/custom" -}}
{{- end -}}
{{- end -}}

{{- if and .Values.web.enabled (or (eq $profile "lite") (eq $profile "full")) -}}
{{- if not .Values.web.mfaSecretName -}}
{{- fail "profile=lite/full with web.enabled=true requires web.mfaSecretName; create the Web MFA Secret before installing the chart" -}}
{{- end -}}
{{- if not .Values.web.totpSecretKey -}}
{{- fail "web.mfaSecretName requires web.totpSecretKey" -}}
{{- end -}}
{{- if not .Values.web.sessionSecretKey -}}
{{- fail "web.mfaSecretName requires web.sessionSecretKey" -}}
{{- end -}}
{{- end -}}
{{- if and (eq $profile "full") .Values.signer.enabled (eq (lower .Values.signer.keyProvider) "pkcs11") -}}
{{- if not .Values.signer.pkcs11SignCommand -}}
{{- fail "profile=full with signer.keyProvider=pkcs11 requires signer.pkcs11SignCommand" -}}
{{- end -}}
{{- if not .Values.signer.pkcs11SignCommandDelivery -}}
{{- fail "profile=full with signer.keyProvider=pkcs11 requires signer.pkcs11SignCommandDelivery=custom-image or volume so the command is actually present in the signer container" -}}
{{- end -}}
{{- if and (ne .Values.signer.pkcs11SignCommandDelivery "custom-image") (ne .Values.signer.pkcs11SignCommandDelivery "volume") -}}
{{- fail "signer.pkcs11SignCommandDelivery must be custom-image or volume" -}}
{{- end -}}
{{- if eq .Values.signer.pkcs11SignCommandDelivery "volume" -}}
{{- if or (eq (len .Values.signer.extraVolumes) 0) (eq (len .Values.signer.extraVolumeMounts) 0) -}}
{{- fail "signer.pkcs11SignCommandDelivery=volume requires signer.extraVolumes and signer.extraVolumeMounts to deliver the PKCS#11 signing command" -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{- if .Values.ingress.enabled -}}
{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "ingress.enabled requires service.type=ClusterIP; expose the ClusterIP Service through ingress/gateway policy instead of combining chart ingress with NodePort/LoadBalancer" -}}
{{- end -}}
{{- if not .Values.ingress.backendProtocolAcknowledged -}}
{{- fail "ingress.enabled requires ingress.backendProtocolAcknowledged=true after configuring controller-specific HTTPS upstream and mTLS/pass-through behavior" -}}
{{- end -}}
{{- if and (not .Values.ingress.api.enabled) (not .Values.ingress.web.enabled) -}}
{{- fail "ingress.enabled requires at least one of ingress.api.enabled or ingress.web.enabled" -}}
{{- end -}}
{{- if and .Values.ingress.api.enabled (not .Values.ingress.api.host) -}}
{{- fail "ingress.api.enabled requires ingress.api.host" -}}
{{- end -}}
{{- if and .Values.ingress.web.enabled (not .Values.web.enabled) -}}
{{- fail "ingress.web.enabled requires web.enabled=true" -}}
{{- end -}}
{{- if and .Values.ingress.web.enabled (not .Values.ingress.web.host) -}}
{{- fail "ingress.web.enabled requires ingress.web.host" -}}
{{- end -}}
{{- if and .Values.ingress.api.enabled .Values.ingress.web.enabled (eq .Values.ingress.api.host .Values.ingress.web.host) (eq .Values.ingress.api.path .Values.ingress.web.path) -}}
{{- fail "ingress api and web routes must not use the same host and path because they target different mTLS listeners" -}}
{{- end -}}
{{- end -}}
