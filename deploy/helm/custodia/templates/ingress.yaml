{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "custodia.serverFullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
{{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
{{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
{{- end }}
{{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | indent 4 }}
{{- end }}
  rules:
{{- if .Values.ingress.api.enabled }}
    - host: {{ .Values.ingress.api.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.api.path | quote }}
            pathType: {{ .Values.ingress.api.pathType }}
            backend:
              service:
                name: {{ include "custodia.serverFullname" . }}
                port:
                  name: https
{{- end }}
{{- if and .Values.web.enabled .Values.ingress.web.enabled }}
    - host: {{ .Values.ingress.web.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.web.path | quote }}
            pathType: {{ .Values.ingress.web.pathType }}
            backend:
              service:
                name: {{ include "custodia.serverFullname" . }}
                port:
                  name: web
{{- end }}
{{- end }}
