apiVersion: v1
kind: Service
metadata:
  name: {{ include "custodia.serverFullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
{{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
{{- if .Values.web.exposeOnService }}
    - name: web
      port: {{ .Values.web.port }}
      targetPort: web
{{- end }}
{{- if .Values.health.exposeOnService }}
    - name: health
      port: {{ .Values.health.port }}
      targetPort: health
{{- end }}
  selector:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
