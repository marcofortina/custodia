apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "custodia.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "custodia.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "custodia.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: custodia
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "custodia.fullname" . }}
          env:
            - name: CUSTODIA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.databaseURLSecretName }}
                  key: {{ .Values.config.databaseURLSecretKey }}
            - name: CUSTODIA_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.valkeyURLSecretName }}
                  key: {{ .Values.config.valkeyURLSecretKey }}
            - name: CUSTODIA_TLS_CERT_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.certKey }}
            - name: CUSTODIA_TLS_KEY_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.keyKey }}
            - name: CUSTODIA_CLIENT_CA_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.clientCAKey }}
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /ready
              port: https
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /live
              port: https
          volumeMounts:
            - name: mtls
              mountPath: /etc/custodia/tls
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: mtls
          secret:
            secretName: {{ .Values.mtls.secretName }}
