apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "custodia.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
{{ toYaml .Values.deploymentStrategy | indent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "custodia.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        custodia.io/mtls-secret: {{ .Values.mtls.secretName | quote }}
{{- if .Values.signer.enabled }}
        custodia.io/signer-client-secret: {{ .Values.signer.clientSecretName | quote }}
{{- end }}
{{- with .Values.podAnnotations }}
{{ toYaml . | indent 8 }}
{{- end }}
      labels:
        app.kubernetes.io/name: {{ include "custodia.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: server
    spec:
{{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
{{- end }}
      serviceAccountName: {{ include "custodia.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
{{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.topologySpreadConstraints.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "custodia.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: server
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: custodia
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: {{ .Values.service.port }}
{{- if .Values.web.enabled }}
            - name: web
              containerPort: {{ .Values.web.port }}
{{- end }}
            - name: health
              containerPort: {{ .Values.health.port }}
          envFrom:
            - configMapRef:
                name: {{ include "custodia.fullname" . }}
          env:
{{- if .Values.config.databaseURLSecretName }}
            - name: CUSTODIA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.databaseURLSecretName }}
                  key: {{ .Values.config.databaseURLSecretKey }}
{{- end }}
{{- if .Values.config.valkeyURLSecretName }}
            - name: CUSTODIA_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.valkeyURLSecretName }}
                  key: {{ .Values.config.valkeyURLSecretKey }}
{{- end }}
{{- if and .Values.web.enabled .Values.web.mfaSecretName }}
            - name: CUSTODIA_WEB_TOTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.mfaSecretName }}
                  key: {{ .Values.web.totpSecretKey }}
            - name: CUSTODIA_WEB_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.mfaSecretName }}
                  key: {{ .Values.web.sessionSecretKey }}
{{- end }}
            - name: CUSTODIA_TLS_CERT_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.certKey }}
            - name: CUSTODIA_TLS_KEY_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.keyKey }}
            - name: CUSTODIA_CLIENT_CA_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.clientCAKey }}
{{- if .Values.mtls.clientCRLKey }}
            - name: CUSTODIA_CLIENT_CRL_FILE
              value: /etc/custodia/tls/{{ .Values.mtls.clientCRLKey }}
{{- end }}
          readinessProbe:
            httpGet:
              scheme: HTTP
              path: /ready
              port: health
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              scheme: HTTP
              path: /live
              port: health
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          volumeMounts:
            - name: mtls
              mountPath: /etc/custodia/tls
              readOnly: true
{{- if .Values.signer.enabled }}
            - name: signer-client
              mountPath: /etc/custodia/signer-client
              readOnly: true
{{- end }}
{{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: mtls
          secret:
            secretName: {{ .Values.mtls.secretName }}
{{- if .Values.signer.enabled }}
        - name: signer-client
          secret:
            secretName: {{ .Values.signer.clientSecretName }}
{{- end }}
{{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "custodia.persistenceClaimName" . }}
{{- end }}
