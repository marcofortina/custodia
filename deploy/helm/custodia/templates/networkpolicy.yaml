{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "custodia.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custodia.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "custodia.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
{{- if .Values.networkPolicy.egress.enabled }}
    - Egress
{{- end }}
  ingress:
    - from:
        - namespaceSelector:
{{ toYaml .Values.networkPolicy.ingressNamespaceSelector | indent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
        - protocol: TCP
          port: {{ .Values.health.port }}
{{- if .Values.networkPolicy.egress.enabled }}
  egress:
{{ toYaml .Values.networkPolicy.egress.rules | indent 4 }}
{{- end }}
{{- end }}
