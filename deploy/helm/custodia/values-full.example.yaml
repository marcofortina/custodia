# Full profile example for Kubernetes.
# Copy this file, replace every registry/DNS/secret placeholder, then run:
#   make helm-check
# before installing or committing changes.
profile: full
replicaCount: 3

image:
  repository: registry.example.internal/custodia/custodia-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

config:
  serverURL: "https://custodia.example.internal:8443"
  storeBackend: postgres
  databaseURL: ""
  databaseURLSecretName: custodia-database
  databaseURLSecretKey: database-url
  rateLimitBackend: valkey
  valkeyURLSecretName: custodia-valkey
  valkeyURLSecretKey: valkey-url
  deploymentMode: kubernetes-full
  databaseHATarget: external
  auditShipmentSink: "object-lock-or-siem"
  signerURL: ""

mtls:
  clientCRLKey: client.crl.pem

web:
  mfaSecretName: custodia-web-mfa
  totpSecretKey: totp-secret
  sessionSecretKey: session-secret

persistence:
  enabled: false

signer:
  enabled: true
  keyProvider: pkcs11
  pkcs11SignCommand: /usr/local/bin/custodia-pkcs11-sign
  # Full profile images must deliver this command explicitly. Use
  # custom-image when the helper is baked into the image, or volume when
  # signer.extraVolumes/extraVolumeMounts mount it at runtime.
  pkcs11SignCommandDelivery: custom-image
  adminSubjects: admin
  secretName: custodia-signer-ca
  clientSecretName: custodia-signer-client

podDisruptionBudget:
  enabled: true
  minAvailable: 2
